{{/* Photo lightbox — click any image (homepage frame, post body, carousel,
     grid, live-photo) to expand. Carousel openings get prev/next buttons
     wired up in JS. */}}
<div class="lightbox" id="photoLightbox" role="dialog" aria-modal="true" aria-hidden="true">
  <button class="lightbox__close" id="lightboxClose" aria-label="Close">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
  </button>
  <button class="lightbox__nav lightbox__nav--prev" id="lightboxPrev" aria-label="Previous" hidden>
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
  </button>
  <button class="lightbox__nav lightbox__nav--next" id="lightboxNext" aria-label="Next" hidden>
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
  </button>
  <div class="lightbox__media" id="lightboxMedia"></div>
  <div class="lightbox__cap" id="lightboxCap"><b>—</b><span>—</span></div>
</div>
